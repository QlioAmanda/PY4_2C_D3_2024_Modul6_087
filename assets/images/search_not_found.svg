<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#475569" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="transparent"/>

  <!-- Background Blobs -->
  <path d="M 400 150 C 550 100, 650 250, 550 400 C 450 550, 250 500, 200 350 C 150 200, 250 200, 400 150 Z" fill="url(#bg)" opacity="0.6"/>
  <circle cx="200" cy="200" r="40" fill="#CBD5E1" opacity="0.4"/>
  <circle cx="600" cy="450" r="60" fill="#94A3B8" opacity="0.2"/>

  <!-- Main Illustration: Magnifying Glass -->
  <g transform="translate(400, 300)" filter="url(#shadow)">
    <!-- Handle -->
    <rect x="50" y="50" width="100" height="30" rx="15" fill="#3B82F6" transform="rotate(45 50 50)"/>
    <rect x="60" y="55" width="80" height="20" rx="10" fill="#2563EB" transform="rotate(45 50 50)"/>
    
    <!-- Lens Frame -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#64748B" stroke-width="16"/>
    
    <!-- Lens Glass -->
    <circle cx="0" cy="0" r="82" fill="#FFFFFF"/>
    <path d="M -50 -50 A 70 70 0 0 1 50 -50" fill="none" stroke="#E2E8F0" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Document Inside Lens -->
    <rect x="-35" y="-45" width="70" height="90" rx="8" fill="#F8FAFC"/>
    <rect x="-35" y="-45" width="70" height="90" rx="8" fill="none" stroke="#94A3B8" stroke-width="6"/>
    <path d="M -15 -20 L 15 -20 M -15 0 L 15 0 M -15 20 L 0 20" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Question Mark -->
    <text x="0" y="10" font-family="sans-serif" font-size="60" font-weight="bold" fill="#F87171" text-anchor="middle" alignment-baseline="middle">?</text>
  </g>

  <!-- Floating Elements: Crosses & Dots -->
  <path d="M 250 400 L 270 420 M 270 400 L 250 420" stroke="#F87171" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M 550 180 L 570 200 M 570 180 L 550 200" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <circle cx="300" cy="200" r="6" fill="#60A5FA"/>
  <circle cx="500" cy="420" r="8" fill="#FBBF24"/>

</svg>
